services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: social-media-dev
    working_dir: /app/app/server
    command: npx nodemon -L index.js
    ports:
      - "4000:4000"
    env_file:
      - ./app/server/.env
    environment:
      - PORT=4000
      # Override the Atlas URL from .env: use the local Mongo container instead.
      - DB_URL=mongodb://mongo:27017
      - DATABASE=Instagram
    volumes:
      - ./app/server:/app/app/server
      # Keep container-built (Linux) node_modules; don't let host shadow them.
      - root_node_modules:/app/node_modules
      - server_node_modules:/app/app/server/node_modules
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: social-media-dev
    working_dir: /app/app/client
    command: npx vite
    ports:
      - "5173:5173"
    environment:
      # Browser talks to the server via the host port mapping.
      - VITE_API_URL=http://localhost:4000
      - VITE_USE_POLLING=true
    volumes:
      - ./app/client:/app/app/client
      - root_node_modules:/app/node_modules
      - client_node_modules:/app/app/client/node_modules
    depends_on:
      - server

volumes:
  mongo_data:
  root_node_modules:
  server_node_modules:
  client_node_modules:
